# replace prefix with Ctrl-Space
unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

# reload config
bind r source-file ~/.tmux.conf \; display "Configuration reloaded!"

# respawn pane
bind R respawn-pane -k

# replace split-window bind to - and |
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# VI mode
set -g mode-keys vi

# set base index to 1
set -g base-index 1
set -g pane-base-index 1

# enable mouse
set -g mouse on
# Sane scrolling
# set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# ===== Color Configuration =====
# Advertise a 256-color tmux terminfo (prefer tmux-256color if available)
set -g default-terminal "tmux-256color"

# Tell tmux the outer terminal supports truecolor
# For tmux ≥ 3.2:
set -as terminal-features ",xterm-256color:RGB"

# Back-compat for older tmux (and for sane scrolling):
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-256color*:smcup@:rmcup@"

# scrollback buff
set -g history-limit 10000

# replace switch panes to Alt-Arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane resizing shortcuts
bind h resize-pane -L 5 # Left
bind j resize-pane -D 5 # Down
bind k resize-pane -U 5 # Up
bind l resize-pane -R 5 # Right

# change window history number of lines
set-option -g history-limit 10000

# keep current path when creating new windows
bind c new-window -c "#{pane_current_path}"

# =============================================================================
# Shell-specific windows/panes
# =============================================================================
# Prefix + B = new bash window
# Prefix + Z = new zsh window
# Prefix + F = new fish window (if installed)
# Prefix + N = new nushell window (if installed)
bind B new-window -c "#{pane_current_path}" "bash"
bind Z new-window -c "#{pane_current_path}" "zsh"
bind F new-window -c "#{pane_current_path}" "fish"
bind N new-window -c "#{pane_current_path}" "nu"

# Split with specific shell (Prefix + Alt + key)
bind M-b split-window -h -c "#{pane_current_path}" "bash"
bind M-z split-window -h -c "#{pane_current_path}" "zsh"
bind M-f split-window -h -c "#{pane_current_path}" "fish"
bind M-n split-window -h -c "#{pane_current_path}" "nu"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-yank'

# tmux-yank configuration
set -g @yank_selection_mouse 'clipboard' # or 'primary' or 'secondary'
set -g @yank_selection 'clipboard'       # or 'primary' or 'secondary'
set -g @yank_action 'copy-pipe-and-cancel' # or 'copy-pipe'

# Better mouse mode configuration
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# SSH Agent Management
source-file ~/.config/tmux/ssh-agent-hooks.conf

# Optional Catppuccin theme (guarded; no effect unless file exists)
# To enable Mocha: place a theme file at ~/.config/tmux/themes/catppuccin-mocha.tmux
# Optionally set flavour for theme plugins:
# set -g @catppuccin_flavour 'mocha'
if-shell 'test -f ~/.config/tmux/themes/catppuccin-mocha.tmux' \
  'source-file ~/.config/tmux/themes/catppuccin-mocha.tmux'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
