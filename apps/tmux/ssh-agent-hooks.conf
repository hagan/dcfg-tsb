# SSH Agent Management Hooks for Tmux
# Include this in your tmux.conf with: source-file ~/.config/tmux/ssh-agent-hooks.conf

# Automatically label SSH agents when creating new sessions/windows/panes
set-hook -g after-new-session 'run-shell -b "~/.config/scripts/ssh-agent-label.sh label >/dev/null 2>&1 || true"'
set-hook -g after-new-window 'run-shell -b "~/.config/scripts/ssh-agent-label.sh label >/dev/null 2>&1 || true"'
set-hook -g after-split-window 'run-shell -b "~/.config/scripts/ssh-agent-label.sh label >/dev/null 2>&1 || true"'

# Sync SSH agent environment when switching panes
# Note: This requires the pane to have run sshr to set pane-specific environment
set-hook -g pane-focus-in 'run-shell "~/.config/scripts/ssh-agent-label.sh tmux-sync #D >/dev/null 2>&1 || true"'

# Show current SSH agent in status line (optional)
# Option A (ID only): Add to your status-right or status-left
#   #{?SSH_AGENT_ID,SSH:#{=8:SSH_AGENT_ID},SSH:none}
#
# Option B (host + key count via helper script):
#   Make sure the helper is executable: chmod +x ~/.config/scripts/ssh-agent-statusline.sh
#   Then add to your tmux.conf:
#     set -g status-right '#(~/.config/scripts/ssh-agent-statusline.sh) | %Y-%m-%d %H:%M'

# Key binding to refresh SSH agent in current pane
bind S run-shell "~/.config/scripts/ssh-agent-label.sh select --newest" \; display-message "SSH agent refreshed"

# Key binding to list all agents
bind A run-shell "~/.config/scripts/ssh-agent-label.sh list"

# Optional: Show agent info when attaching
set-hook -g client-attached 'run-shell -b "~/.config/scripts/ssh-agent-label.sh summary --stale 180 2>/dev/null || true"'
set-hook -ga client-attached 'run-shell -b "~/.config/scripts/ssh-agent-label.sh refresh --lazy 180 >/dev/null 2>&1"'
set-hook -ga client-attached 'run-shell -b "~/.config/scripts/ssh-agent-label.sh gc --max-age 86400 --quiet >/dev/null 2>&1"'
